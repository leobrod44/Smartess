<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartess Video Stream</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8f9fa;
      padding-top: 20px;
    }
    .video-card {
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      overflow: hidden;
    }
    .video-container {
      background-color: #000;
      position: relative;
    }
    video {
      width: 100%;
      display: block;
    }
    .stats-panel {
      background-color: rgba(0,0,0,0.7);
      color: #fff;
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      max-width: 200px;
      display: none;
    }
    .camera-selector {
      margin-bottom: 20px;
    }
    .stream-stats {
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    .connection-status {
      width: 15px;
      height: 15px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 5px;
    }
    .connected {
      background-color: #28a745;
    }
    .disconnected {
      background-color: #dc3545;
    }
    .connecting {
      background-color: #ffc107;
    }
    .log-entry {
      margin-bottom: 5px;
      padding: 3px;
      border-bottom: 1px solid #eee;
    }
    .log-entry.error {
      color: #dc3545;
      background-color: rgba(220, 53, 69, 0.1);
    }
    .log-entry.warning {
      color: #ffc107;
      background-color: rgba(255, 193, 7, 0.1);
    }
    .log-entry.success {
      color: #28a745;
      background-color: rgba(40, 167, 69, 0.1);
    }
  </style>
</head>
<body>
<div class="container">
  <h1 class="mb-4 text-center">Smartess Camera Viewer</h1>

  <div class="row">
    <div class="col-md-8">
      <div class="video-card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <div>
            <span id="cameraName">Default Camera</span>
            <span class="connection-status disconnected" id="connectionIndicator"></span>
          </div>
          <div class="btn-group">
            <button class="btn btn-sm btn-primary" id="hlsMode">HLS Mode</button>
            <button class="btn btn-sm btn-outline-primary" id="wsMode">WebSocket Mode</button>
          </div>
        </div>
        <div class="video-container">
          <video id="videoPlayer" controls playsinline></video>
          <div class="stats-panel" id="statsPanel">
            <div>Resolution: <span id="videoResolution">-</span></div>
            <div>Bitrate: <span id="videoBitrate">-</span></div>
            <div>Buffer: <span id="videoBuffer">-</span></div>
          </div>
        </div>
        <div class="card-footer">
          <div class="row">
            <div class="col-md-6">
              <div class="input-group">
                <label class="input-group-text" for="cameraSelect">Camera</label>
                <select class="form-select" id="cameraSelect">
                  <option value="default">Default</option>
                  <!-- Other cameras will be added dynamically -->
                </select>
              </div>
            </div>
            <div class="col-md-6 text-end">
              <button class="btn btn-sm btn-info" id="toggleStats">Show Stats</button>
              <button class="btn btn-sm btn-secondary" id="refreshStream">Refresh</button>
              <a class="btn btn-sm btn-warning" id="downloadSegment" href="#" target="_blank">Download Segment</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Stream Information</h5>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Connection Status</label>
            <div class="input-group">
              <span class="input-group-text"><span id="statusIndicator" class="connection-status disconnected"></span></span>
              <input type="text" class="form-control" id="connectionStatus" value="Disconnected" readonly>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Stream URL</label>
            <input type="text" class="form-control" id="streamUrl" readonly>
          </div>

          <div class="mb-3">
            <label class="form-label">Stream Log</label>
            <div class="stream-stats border rounded p-2" id="logContainer"></div>
          </div>

          <div class="d-grid gap-2">
            <button class="btn btn-danger btn-sm" id="clearLog">Clear Log</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-4">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Debugging Tools</h5>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6">
              <h6>HLS Playlist</h6>
              <div class="border rounded p-2 mb-3" style="height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px;" id="playlistContent">
                No playlist loaded
              </div>
            </div>
            <div class="col-md-6">
              <h6>Available Debug Files</h6>
              <div class="border rounded p-2" style="height: 200px; overflow-y: auto;" id="debugFiles">
                Loading...
              </div>
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-12">
              <div class="d-flex gap-2">
                <button class="btn btn-sm btn-primary" id="loadPlaylist">Load HLS Playlist</button>
                <button class="btn btn-sm btn-info" id="refreshDebugFiles">Refresh Debug Files</button>
                <a href="/debug" target="_blank" class="btn btn-sm btn-secondary">Open Debug Page</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
  // DOM Elements
  const videoElement = document.getElementById('videoPlayer');
  const cameraSelect = document.getElementById('cameraSelect');
  const cameraName = document.getElementById('cameraName');
  const connectionStatus = document.getElementById('connectionStatus');
  const statusIndicator = document.getElementById('statusIndicator');
  const connectionIndicator = document.getElementById('connectionIndicator');
  const streamUrl = document.getElementById('streamUrl');
  const logContainer = document.getElementById('logContainer');
  const clearLogBtn = document.getElementById('clearLog');
  const hlsModeBtn = document.getElementById('hlsMode');
  const wsModeBtn = document.getElementById('wsMode');
  const refreshStreamBtn = document.getElementById('refreshStream');
  const toggleStatsBtn = document.getElementById('toggleStats');
  const statsPanel = document.getElementById('statsPanel');
  const videoResolution = document.getElementById('videoResolution');
  const videoBitrate = document.getElementById('videoBitrate');
  const videoBuffer = document.getElementById('videoBuffer');
  const playlistContent = document.getElementById('playlistContent');
  const loadPlaylistBtn = document.getElementById('loadPlaylist');
  const debugFiles = document.getElementById('debugFiles');
  const refreshDebugFilesBtn = document.getElementById('refreshDebugFiles');
  const downloadSegmentBtn = document.getElementById('downloadSegment');

  // App State
  let webSocket = null;
  let hlsPlayer = null;
  let currentMode = 'hls'; // 'hls' or 'ws'
  let mediaSource = null;
  let sourceBuffer = null;
  let wsChunks = [];
  let streamStartTime = 0;
  let totalBytesReceived = 0;
  let lastStatsUpdate = 0;
  let bitrateArray = [];
  let videoSegments = [];

  // Initialize
  function init() {
    loadCameras();
    refreshDebugFiles();
    setupEventListeners();

    // Start in HLS mode by default
    hlsModeBtn.click();
  }

  // Load available cameras
  function loadCameras() {
    fetch('/hls/')
            .then(response => response.text())
            .then(html => {
              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');
              const links = doc.querySelectorAll('a');

              // Clear existing options except default
              while (cameraSelect.options.length > 1) {
                cameraSelect.remove(1);
              }

              // Add each camera as an option
              links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && href !== '../') {
                  const name = href.replace('/', '');
                  const option = document.createElement('option');
                  option.value = name;
                  option.textContent = name;
                  cameraSelect.appendChild(option);
                }
              });

              log('Loaded camera list', 'info');
            })
            .catch(error => {
              log(`Error loading cameras: ${error.message}`, 'error');
            });
  }

  // Set up event listeners
  function setupEventListeners() {
    // Camera selection
    cameraSelect.addEventListener('change', () => {
      const camera = cameraSelect.value;
      cameraName.textContent = camera;

      // Update stream based on current mode
      if (currentMode === 'hls') {
        startHlsStream(camera);
      } else {
        startWebSocketStream(camera);
      }
    });

    // Clear log button
    clearLogBtn.addEventListener('click', () => {
      logContainer.innerHTML = '';
      log('Log cleared', 'info');
    });

    // Stream mode buttons
    hlsModeBtn.addEventListener('click', () => {
      currentMode = 'hls';
      hlsModeBtn.classList.replace('btn-outline-primary', 'btn-primary');
      wsModeBtn.classList.replace('btn-primary', 'btn-outline-primary');

      stopWebSocketStream();
      startHlsStream(cameraSelect.value);
    });

    wsModeBtn.addEventListener('click', () => {
      currentMode = 'ws';
      wsModeBtn.classList.replace('btn-outline-primary', 'btn-primary');
      hlsModeBtn.classList.replace('btn-primary', 'btn-outline-primary');

      stopHlsStream();
      startWebSocketStream(cameraSelect.value);
    });

    // Refresh stream button
    refreshStreamBtn.addEventListener('click', () => {
      if (currentMode === 'hls') {
        stopHlsStream();
        startHlsStream(cameraSelect.value);
      } else {
        stopWebSocketStream();
        startWebSocketStream(cameraSelect.value);
      }
    });

    // Toggle stats button
    toggleStatsBtn.addEventListener('click', () => {
      if (statsPanel.style.display === 'none' || !statsPanel.style.display) {
        statsPanel.style.display = 'block';
        toggleStatsBtn.textContent = 'Hide Stats';
        startStatsUpdates();
      } else {
        statsPanel.style.display = 'none';
        toggleStatsBtn.textContent = 'Show Stats';
        stopStatsUpdates();
      }
    });

    // Load playlist button
    loadPlaylistBtn.addEventListener('click', () => {
      const camera = cameraSelect.value;
      fetch(`/hls/${camera}/segments.m3u8`)
              .then(response => {
                if (!response.ok) {
                  throw new Error(`HTTP error ${response.status}`);
                }
                return response.text();
              })
              .then(text => {
                playlistContent.textContent = text;

                // Extract segment names from playlist
                const lines = text.split('\n');
                videoSegments = lines.filter(line => line.endsWith('.ts') || line.endsWith('.mp4'));

                // Update download link
                if (videoSegments.length > 0) {
                  downloadSegmentBtn.href = `/download/${camera}/${videoSegments[0]}`;
                  downloadSegmentBtn.classList.remove('disabled');
                } else {
                  downloadSegmentBtn.classList.add('disabled');
                }

                log(`Loaded playlist with ${videoSegments.length} segments`, 'success');
              })
              .catch(error => {
                playlistContent.textContent = `Error loading playlist: ${error.message}`;
                log(`Error loading playlist: ${error.message}`, 'error');
              });
    });

    // Refresh debug files
    refreshDebugFilesBtn.addEventListener('click', refreshDebugFiles);
  }

  // Refresh debug files list
  function refreshDebugFiles() {
    fetch('/debug/')
            .then(response => response.text())
            .then(html => {
              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');
              const links = doc.querySelectorAll('a');

              debugFiles.innerHTML = '';

              let foundFiles = false;
              links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && href !== '../') {
                  foundFiles = true;
                  const fileItem = document.createElement('div');
                  fileItem.classList.add('mb-2');

                  const fileLink = document.createElement('a');
                  fileLink.href = `/debug/${href}`;
                  fileLink.textContent = href;
                  fileLink.setAttribute('target', '_blank');

                  fileItem.appendChild(fileLink);
                  debugFiles.appendChild(fileItem);
                }
              });

              if (!foundFiles) {
                debugFiles.textContent = 'No debug files found';
              }
            })
            .catch(error => {
              debugFiles.textContent = `Error loading debug files: ${error.message}`;
            });
  }

  // Start HLS stream
  function startHlsStream(camera) {
    stopHlsStream();

    const hlsUrl = `/tmp/data/${camera}/segments.m3u8`//`/hls/${camera}/segments.m3u8`;
    streamUrl.value = hlsUrl;

    log(`Starting HLS stream for camera: ${camera}`, 'info');
    setConnectionStatus('connecting');

    if (Hls.isSupported()) {
      hlsPlayer = new Hls({
        debug: false,
        startLevel: 0,
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
      });

      hlsPlayer.loadSource(hlsUrl);
      hlsPlayer.attachMedia(videoElement);

      hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
        log('HLS manifest parsed, starting playback', 'success');
        videoElement.play()
                .then(() => {
                  setConnectionStatus('connected');
                })
                .catch(err => {
                  log(`Video playback error: ${err.message}`, 'error');
                  setConnectionStatus('disconnected');
                });
      });

      hlsPlayer.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          switch(data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              log(`HLS network error: ${data.details}`, 'error');
              hlsPlayer.startLoad();
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              log(`HLS media error: ${data.details}`, 'error');
              hlsPlayer.recoverMediaError();
              break;
            default:
              log(`HLS fatal error: ${data.details}`, 'error');
              setConnectionStatus('disconnected');
              stopHlsStream();
              break;
          }
        } else {
          log(`HLS non-fatal error: ${data.details}`, 'warning');
        }
      });
    } else {
      // For browsers that don't support HLS.js
      log('HLS.js not supported, trying native playback', 'warning');
      videoElement.src = hlsUrl;
      videoElement.addEventListener('loadedmetadata', () => {
        log('Native HLS playback started', 'success');
        videoElement.play();
        setConnectionStatus('connected');
      });

      videoElement.addEventListener('error', () => {
        log(`Native playback error: ${videoElement.error.message}`, 'error');
        setConnectionStatus('disconnected');
      });
    }
  }

  // Stop HLS stream
  function stopHlsStream() {
    if (hlsPlayer) {
      hlsPlayer.destroy();
      hlsPlayer = null;
      log('HLS player destroyed', 'info');
    }

    videoElement.src = '';
    setConnectionStatus('disconnected');
  }

  // Initialize MediaSource for WebSocket streaming
  function initMediaSource() {
    if (!window.MediaSource) {
      log('MediaSource API not supported in your browser', 'error');
      return false;
    }

    mediaSource = new MediaSource();
    videoElement.src = URL.createObjectURL(mediaSource);

    mediaSource.addEventListener('sourceopen', () => {
      log('MediaSource opened', 'info');

      try {
        sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.64001E"');
        sourceBuffer.mode = 'segments';
        sourceBuffer.addEventListener('updateend', () => {
          if (wsChunks.length > 0 && !sourceBuffer.updating) {
            try {
              sourceBuffer.appendBuffer(wsChunks.shift());
            } catch (e) {
              log(`Error appending buffer: ${e.message}`, 'error');
            }
          }
        });

        log('SourceBuffer created successfully', 'success');
        return true;
      } catch (e) {
        log(`Error creating SourceBuffer: ${e.message}`, 'error');
        return false;
      }
    });

    mediaSource.addEventListener('sourceended', () => {
      log('MediaSource ended', 'info');
    });

    mediaSource.addEventListener('error', (e) => {
      log(`MediaSource error: ${e}`, 'error');
    });

    return true;
  }

  // Start WebSocket stream
  function startWebSocketStream(camera) {
    stopWebSocketStream();

    if (!initMediaSource()) {
      return;
    }

    const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
    const wsUrl = `${wsProtocol}${window.location.host}/ws?stream=${camera}`;
    streamUrl.value = wsUrl;

    log(`Connecting to WebSocket: ${wsUrl}`, 'info');
    setConnectionStatus('connecting');

    webSocket = new WebSocket(wsUrl);
    webSocket.binaryType = 'arraybuffer';

    webSocket.onopen = () => {
      log('WebSocket connection established', 'success');
      setConnectionStatus('connected');
      streamStartTime = Date.now();
      totalBytesReceived = 0;
      videoElement.play().catch(e => log(`Play error: ${e.message}`, 'error'));
    };

    webSocket.onmessage = (event) => {
      const data = event.data;
      totalBytesReceived += data.byteLength;

      // Calculate bitrate every second
      const now = Date.now();
      if (now - lastStatsUpdate > 1000) {
        const elapsedSec = (now - streamStartTime) / 1000;
        const kbps = Math.round((totalBytesReceived * 8) / elapsedSec / 1024);
        bitrateArray.push(kbps);

        // Keep only last 5 values for averaging
        if (bitrateArray.length > 5) {
          bitrateArray.shift();
        }

        lastStatsUpdate = now;
      }

      // Handle video data
      try {
        if (mediaSource.readyState === 'open') {
          if (!sourceBuffer.updating) {
            sourceBuffer.appendBuffer(data);
          } else {
            wsChunks.push(data);
          }
        } else {
          wsChunks.push(data);
        }
      } catch (e) {
        log(`Error processing WebSocket data: ${e.message}`, 'error');
      }
    };

    webSocket.onclose = () => {
      log('WebSocket connection closed', 'warning');
      setConnectionStatus('disconnected');
    };

    webSocket.onerror = (error) => {
      log(`WebSocket error: ${error}`, 'error');
      setConnectionStatus('disconnected');
    };
  }
  // Stop WebSocket stream
  function stopWebSocketStream() {
    if (webSocket) {
      webSocket.close();
      webSocket = null;
      log('WebSocket connection closed', 'info');
    }

    // Clear any pending chunks
    wsChunks = [];

    // Close MediaSource if open
    if (mediaSource && mediaSource.readyState === 'open') {
      try {
        mediaSource.endOfStream();
      } catch (e) {
        console.error('Error ending MediaSource stream:', e);
      }
    }

    mediaSource = null;
    sourceBuffer = null;

    videoElement.src = '';
    setConnectionStatus('disconnected');
  }

  // Update connection status indicators
  function setConnectionStatus(status) {
    switch (status) {
      case 'connected':
        connectionStatus.value = 'Connected';
        statusIndicator.className = 'connection-status connected';
        connectionIndicator.className = 'connection-status connected';
        break;
      case 'connecting':
        connectionStatus.value = 'Connecting...';
        statusIndicator.className = 'connection-status connecting';
        connectionIndicator.className = 'connection-status connecting';
        break;
      default:
        connectionStatus.value = 'Disconnected';
        statusIndicator.className = 'connection-status disconnected';
        connectionIndicator.className = 'connection-status disconnected';
        break;
    }
  }

  // Log message to UI
  function log(message, level = 'info') {
    const now = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.classList.add('log-entry');

    if (level === 'error') {
      entry.classList.add('error');
    } else if (level === 'warning') {
      entry.classList.add('warning');
    } else if (level === 'success') {
      entry.classList.add('success');
    }

    entry.textContent = `[${now}] ${message}`;
    logContainer.appendChild(entry);
    logContainer.scrollTop = logContainer.scrollHeight;
  }

  // Start collecting and displaying video stats
  let statsInterval = null;
  function startStatsUpdates() {
    if (statsInterval) {
      clearInterval(statsInterval);
    }

    statsInterval = setInterval(() => {
      // Show video resolution
      if (videoElement.videoWidth && videoElement.videoHeight) {
        videoResolution.textContent = `${videoElement.videoWidth}x${videoElement.videoHeight}`;
      } else {
        videoResolution.textContent = '-';
      }

      // Show bitrate (average of last values)
      if (bitrateArray.length > 0) {
        const avgBitrate = Math.round(bitrateArray.reduce((a, b) => a + b, 0) / bitrateArray.length);
        videoBitrate.textContent = `${avgBitrate} kbps`;
      } else {
        videoBitrate.textContent = '-';
      }

      // Show buffer length
      if (videoElement.buffered.length > 0) {
        const bufferEnd = videoElement.buffered.end(videoElement.buffered.length - 1);
        const bufferLength = bufferEnd - videoElement.currentTime;
        videoBuffer.textContent = `${bufferLength.toFixed(1)}s`;
      } else {
        videoBuffer.textContent = '-';
      }
    }, 1000);
  }

  // Stop stats updates
  function stopStatsUpdates() {
    if (statsInterval) {
      clearInterval(statsInterval);
      statsInterval = null;
    }
  }

  // Initialize the app
  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
