<!DOCTYPE html>
<html>
<head>
  <title>Video Stream Viewer</title>
  <style>
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
    #videoContainer { max-width: 800px; margin: 0 auto; }
    #videoElement { width: 100%; background: #000; }
    #controls { margin-top: 10px; }
    select { padding: 5px; }
  </style>
</head>
<body>
<div id="videoContainer">
  <h2>Live Camera Stream</h2>
  <video id="videoElement" controls autoplay></video>
  <div id="controls">
    <label for="cameraSelect">Select Camera: </label>
    <select id="cameraSelect"></select>
    <div id="status">Connecting to stream...</div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const videoElement = document.getElementById('videoElement');
    const cameraSelect = document.getElementById('cameraSelect');
    const statusElement = document.getElementById('status');

    let mediaSource;
    let sourceBuffer;
    let websocket;
    let queue = [];
    let isBuffering = false;

    // List of cameras from your configuration
    const cameras = ['REAL', 'ANT', 'MOCK', 'ANTMOCK']; // Replace with dynamic loading if needed

    // Populate camera select dropdown
    cameras.forEach(camera => {
      const option = document.createElement('option');
      option.value = camera;
      option.textContent = camera;
      cameraSelect.appendChild(option);
    });

    // Initialize stream when camera is selected
    cameraSelect.addEventListener('change', function() {
      if (websocket) {
        websocket.close();
      }
      connectToStream(cameraSelect.value);
    });

    function connectToStream(camera) {
      statusElement.textContent = `Connecting to ${camera} stream...`;

      // Create MediaSource
      mediaSource = new MediaSource();
      videoElement.src = URL.createObjectURL(mediaSource);

      mediaSource.addEventListener('sourceopen', function() {
        try {
          // Use 'video/mp4; codecs="avc1.42E01E"' for H.264 video
          sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.42E01E"');

          sourceBuffer.addEventListener('updateend', function() {
            isBuffering = false;
            processQueue();
          });

          // Connect to WebSocket server
          const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
          const wsUrl = `${wsProtocol}//${window.location.hostname}:8080/ws`;
          console.log(wsUrl)
          websocket = new WebSocket(wsUrl);

          websocket.binaryType = "arraybuffer";

          websocket.onopen = function() {
            statusElement.textContent = `Connected to ${camera} stream`;
            // You could send the camera name to request a specific stream
            // websocket.send(camera);
          };

          websocket.onmessage = function(event) {
            if (event.data) {
              queue.push(event.data);
              processQueue();
            }
          };

          websocket.onerror = function(error) {
            statusElement.textContent = `Error: ${error.message}`;
            console.error("WebSocket Error:", error);
          };

          websocket.onclose = function() {
            statusElement.textContent = "Disconnected";
          };

        } catch (e) {
          statusElement.textContent = `Error initializing stream: ${e.message}`;
          console.error("Error initializing stream:", e);
        }
      });
    }

    function processQueue() {
      if (queue.length > 0 && !isBuffering && sourceBuffer && !sourceBuffer.updating) {
        isBuffering = true;
        const data = queue.shift();
        try {
          sourceBuffer.appendBuffer(data);
        } catch (e) {
          console.error("Error appending buffer:", e);
          isBuffering = false;
        }
      }
    }

    // Initialize with first camera
    if (cameras.length > 0) {
      connectToStream(cameras[0]);
    }
  });
</script>
</body>
</html>
