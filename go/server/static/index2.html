<!DOCTYPE html>
<html>
<head>
    <title>Camera Stream</title>
</head>
<body>
<video id="video" controls autoplay width="640" height="480"></video>
<script>
    const video = document.getElementById('video');
    let ws;

    function connectWebSocket() {
        ws = new WebSocket('ws://localhost:8080/ws');
        ws.onopen = () => console.log('WebSocket connected');
        ws.onmessage = (event) => {
            event.data.arrayBuffer().then(buffer => {
                sourceBuffer.appendBuffer(buffer);
                if (video.paused && !sourceBuffer.updating) {
                    video.play();
                }
            }).catch(err => console.error('Error appending buffer:', err));
        };
        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
            setTimeout(connectWebSocket, 2000); // Retry after 2 seconds
        };
        ws.onclose = () => {
            console.log('WebSocket closed');
            setTimeout(connectWebSocket, 2000);
        };
    }

    const mediaSource = new MediaSource();
    video.src = URL.createObjectURL(mediaSource);
    mediaSource.addEventListener('sourceopen', () => {
        const sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.64001e"');
        connectWebSocket();
    });
</script>
</body>
</html>
