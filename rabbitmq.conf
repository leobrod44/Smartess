# General SSL configuration
listeners.ssl.default = 5671
ssl_options.cacertfile = /etc/rabbitmq/certs/ca.pem
ssl_options.certfile = /etc/rabbitmq/certs/server.pem
ssl_options.keyfile = /etc/rabbitmq/certs/server-key.pem
ssl_options.verify = verify_peer
ssl_options.fail_if_no_peer_cert = false

# Web STOMP SSL configuration
web_stomp.ssl.port = 15673
web_stomp.ssl.backlog = 1024
web_stomp.ssl.certfile = /etc/rabbitmq/certs/server.pem
web_stomp.ssl.keyfile = /etc/rabbitmq/certs/server-key.pem
web_stomp.ssl.cacertfile = /etc/rabbitmq/certs/ca.pem

# Default user
default_user = admin
default_pass = admin